# =============================================================================
# PVC pour les configurations DAG générées par OpenMetadata
# Ce volume doit être partagé entre api-server, dag-processor et scheduler
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openmetadata-dependencies-dag-configs
  namespace: openmetadata
  labels:
    app.kubernetes.io/name: airflow
    app.kubernetes.io/component: dag-configs
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
