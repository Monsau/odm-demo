apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openmetadata
  namespace: openmetadata
  annotations:
    # Route traffic through oauth2-proxy for SSO authentication.
    # Architecture: Ingress → oauth2-proxy (4180) → openmetadata (8585)
spec:
  ingressClassName: traefik
  rules:
    - host: openmetadata.192.168.11.150.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy
                port:
                  number: 4180
    - host: openmetadata.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy
                port:
                  number: 4180
